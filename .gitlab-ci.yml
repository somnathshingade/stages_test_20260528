image: alpine:latest

stages:
  - build
  - test
  - deploy

variables:
  NODE_ENV: "development"
  APP_VERSION: "1.0.0"
  IS_TEST_RUN: "true" #we can set value (True/Fauls) at runtime
include:
  - project: "in/it/plm/eplan/somnath/templates"  #This is Project link
    ref: main                                     # we can add in reference Branch, Tag, SHA
    file:                                         # This is folder path into same project
      - 'build-job.yml'
      - 'test-job.yml'
      - 'deploy-job.yml'

  - local: test-job.yml
    rules:
      - if: $DONT_INCLUDE_TESTS == "true"
        when: always

  - local: test-job.yml
    rules:
      - if: $DONT_INCLUDE_TESTS == "true"

        when: never

  - local: "Test1/test1.yml"                   # this is the local file path
  - local: "Test2/test2.yml"                   # this is the local file path
  - template: Auto-DevOps.gitlab-ci.yml