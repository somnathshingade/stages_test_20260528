image: alpine:latest

stages:
  - build
  - test
  - deploy

variables:
  NODE_ENV: "development"
  APP_VERSION: "1.0.0"
  IS_TEST_RUN: "true" # can be overridden at runtime

include:
  - project: 'Somnath/templates'
    file: 
       - 'Somnath/templates/ build-job.yml'
       - ‘Somnath/templates/ test-job.yml
       - ‘Somnath/templates/ deploy-job.yml
