image: alpine:latest

stages:
  - build
  - test
  - deploy

variables:
  NODE_ENV: "development"
  APP_VERSION: "1.0.0"

build_job:
  stage: build
  image: maven:3.9
  variables:
    NODE_ENV: "production"
    APP_VERSION: "2.0.0"
  script:
    - echo "Building the project... $NODE_ENV & $APP_VERSION"
    - ls -la
    # Add your build commands here

test_job:
  stage: test
  image: python:3.12
  script:
    - echo "Running tests... $NODE_ENV & $APP_VERSION"
    - ls -la
    # Add your test commands here

build_job1:
  stage: build
  image: maven:3.9
  when: manual
  variables:
    NODE_ENV: "production"
    APP_VERSION: "2.0.0"
  script:
    - echo "Building the project... $NODE_ENV & $APP_VERSION"
    - ls -la
    # Add your build commands here

build_job2:
  stage: build
  image: maven:3.9
  needs: ["deploy_job"]
  variables:
    NODE_ENV: "production"
    APP_VERSION: "2.0.0"
  script:
    - echo "Building the project... $NODE_ENV & $APP_VERSION"
    - ls -la
    # Add your build commands here

deploy_job:
  stage: deploy
  script:
    - echo "Deploying the application... $NODE_ENV & $APP_VERSION"
    - ls -la
    # Add your deploy commands here