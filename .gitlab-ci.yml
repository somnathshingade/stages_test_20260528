build-job:
  stage: build
  image: python:3.11
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  cache:
    paths:
      - .cache/pip
      
lint-job:
  stage: lint
  image: python:3.11
  script:
    - pip install flake8 black
    - flake8 src/ tests/
    - black --check src/ tests/

