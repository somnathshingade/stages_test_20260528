stages:
  - build
  - lint
  - test
  - deploy

build-job:
  stage: build
  tags:
    - local-runner
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  artifacts:
    paths:
      - dist/

lint-job:
  stage: lint
  tags:
    - Gitlab-runner
  script:
    - pip install flake8
    - flake8 src/ tests/

test-job:
  stage: test
  tags:
    - Gitlab-runner
  script:
    - pip install pytest pytest-cov
    - pytest tests/ --cov=src --cov-report=xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

deploy-local:
  stage: deploy
  tags:
    - Gitlab-runner
  script:
    - echo "Deploying build output to C drive..."
    - mkdir -Force "C:/biginar_output"
    - copy dist/* "C:/biginar_output/"
  only:
    - main